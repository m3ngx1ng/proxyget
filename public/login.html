<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 代理池</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: radial-gradient(circle at top, #1d4ed8 0%, #111827 70%); }
    .card { width: min(420px, 92vw); background: rgba(255,255,255,0.95); border-radius: 24px; padding: 34px; box-shadow: 0 30px 80px rgba(15,23,42,0.35); }
    .logo { font-size: 34px; text-align: center; margin-bottom: 10px; }
    h1 { margin: 0 0 8px; text-align: center; color: #0f172a; }
    p { margin: 0 0 26px; text-align: center; color: #64748b; }
    label { display: block; font-weight: 600; color: #334155; margin-bottom: 8px; }
    input { width: 100%; padding: 13px 14px; border-radius: 14px; border: 1px solid #cbd5e1; margin-bottom: 18px; font-size: 14px; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.12); }
    button { width: 100%; border: 0; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; background: linear-gradient(135deg, #2563eb, #7c3aed); }
    .error { display: none; margin-bottom: 18px; border-radius: 14px; padding: 12px 14px; background: #fee2e2; color: #991b1b; }
    .footer { margin-top: 18px; text-align: center; color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <h1>代理池管理</h1>
    <p>请输入后台账号密码</p>
    <div class="error" id="errorBox"></div>
    <form id="loginForm">
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">登 录</button>
    </form>
    <div class="footer">Cloudflare Worker 管理后台</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const next = new URLSearchParams(location.search).get('next') || '/web';

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        next,
      };

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({ error: '登录失败' }));
        showError(data.error || '登录失败');
        return;
      }

      const data = await response.json();
      location.href = data.next || '/web';
    });
  </script>
</body>
</html>
