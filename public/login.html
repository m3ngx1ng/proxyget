<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 代理池</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'PingFang SC', 'system-ui', 'sans-serif'],
          },
          animation: {
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      background-color: #030712; /* gray-950 */
      color: #f9fafb;
      overflow: hidden;
    }

    /* Custom input autofill styles for dark theme */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px #111827 inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative selection:bg-indigo-500/30">

  <!-- Background Effects -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-600/20 mix-blend-screen filter blur-[100px] animate-blob"></div>
    <div class="absolute top-[20%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/20 mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 2s;"></div>
    <div class="absolute bottom-[-20%] left-[20%] w-[40%] h-[40%] rounded-full bg-blue-600/20 mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 4s;"></div>
    <div class="absolute inset-0 bg-noise opacity-[0.03] mix-blend-overlay"></div>
  </div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md px-6">
    <div class="backdrop-blur-xl bg-gray-900/40 border border-gray-700/50 shadow-2xl rounded-3xl p-8 transform transition-all duration-300 hover:border-gray-600/50 hover:bg-gray-900/50">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-500 shadow-lg mb-6 ring-4 ring-gray-900/50">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">代理池管理</h1>
        <p class="text-sm text-gray-400 mt-2 font-medium">请输入后台账号密码</p>
      </div>

      <!-- Error Message -->
      <div id="errorBox" class="hidden mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-sm text-red-400 flex items-start space-x-3 transition-all">
        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="errorText" class="flex-1 font-medium"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-5">
        <div class="space-y-1.5">
          <label for="username" class="block text-sm font-medium text-gray-300">用户名</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-indigo-400 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
            </div>
            <input type="text" id="username" name="username" autocomplete="username" required
                   class="block w-full pl-11 pr-4 py-3 bg-gray-950/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-600 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all duration-200 outline-none shadow-inner"
                   placeholder="请输入用户名">
          </div>
        </div>

        <div class="space-y-1.5">
          <label for="password" class="block text-sm font-medium text-gray-300">密码</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-500 group-focus-within:text-indigo-400 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <input type="password" id="password" name="password" autocomplete="current-password" required
                   class="block w-full pl-11 pr-4 py-3 bg-gray-950/50 border border-gray-700/50 rounded-xl text-white placeholder-gray-600 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all duration-200 outline-none shadow-inner"
                   placeholder="••••••••">
          </div>
        </div>

        <button type="submit" id="submitBtn"
                class="relative w-full flex justify-center py-3.5 px-4 mt-6 border border-transparent rounded-xl text-sm font-bold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 transition-all duration-200 shadow-[0_0_20px_rgba(99,102,241,0.3)] hover:shadow-[0_0_30px_rgba(99,102,241,0.5)] hover:-translate-y-0.5 active:translate-y-0 overflow-hidden group">
          <span class="relative z-10 flex items-center">
            登 录
            <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>
          </span>
          <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
        </button>
      </form>

      <div class="mt-8 text-center text-xs text-gray-500 font-medium tracking-widest uppercase">
        Cloudflare Worker 管理后台
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const btnContent = submitBtn.innerHTML;

    const next = new URLSearchParams(location.search).get('next') || '/web';

    function showError(message) {
      errorText.textContent = message;
      errorBox.classList.remove('hidden');
      errorBox.classList.add('animate-[pulse_0.5s_ease-in-out]');
      setTimeout(() => errorBox.classList.remove('animate-[pulse_0.5s_ease-in-out]'), 500);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.add('hidden');

      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <span class="relative z-10 flex items-center">
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          正在登录...
        </span>
      `;
      submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        next,
      };

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: '登录失败' }));
          showError(data.error || '登录失败');
          return;
        }

        const data = await response.json();

        // Success state
        submitBtn.innerHTML = `
          <span class="relative z-10 flex items-center text-green-300">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
            登录成功
          </span>
        `;

        setTimeout(() => {
          location.href = data.next || '/web';
        }, 300);
      } catch (err) {
        showError('网络错误，请稍后再试');
      } finally {
        if (!errorBox.classList.contains('hidden')) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = btnContent;
          submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
        }
      }
    });
  </script>
</body>
</html>
