<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProxyPool - 代理池管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Glassmorphism helpers */
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.4); }
    .glass-dark { background: rgba(15,23,42,0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
    .card-glass { background: rgba(255,255,255,0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
    .sidebar-gradient { background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
    .sidebar-accent { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
    .btn-gradient-primary { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
    .btn-gradient-primary:hover { background: linear-gradient(135deg, #2563eb, #0891b2); transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.35); }
    .btn-gradient-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .btn-gradient-danger:hover { background: linear-gradient(135deg, #dc2626, #b91c1c); transform: translateY(-1px); box-shadow: 0 8px 25px rgba(239,68,68,0.35); }
    .btn-ghost { background: rgba(255,255,255,0.6); border: 1px solid rgba(148,163,184,0.25); }
    .btn-ghost:hover { background: rgba(255,255,255,0.9); border-color: rgba(148,163,184,0.5); transform: translateY(-1px); }
    .transition-all { transition: all 0.2s ease; }
    .shadow-soft { box-shadow: 0 4px 20px rgba(15,23,42,0.06); }
    .shadow-soft-lg { box-shadow: 0 12px 40px rgba(15,23,42,0.08); }
    .shadow-soft-xl { box-shadow: 0 20px 60px rgba(15,23,42,0.1); }
    .tr-hover:hover { background: rgba(59,130,246,0.04); }
    dialog { border: none; }
    dialog::backdrop { background: rgba(15,23,42,0.5); backdrop-filter: blur(4px); }
    .notice { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .tag { transition: all 0.15s ease; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="sidebar-gradient w-60 shrink-0 flex flex-col relative overflow-hidden">
      <div class="absolute top-0 left-0 right-0 h-1 sidebar-accent"></div>
      <div class="p-6 pb-4">
        <div class="flex items-center gap-3 mb-8">
          <div class="w-9 h-9 rounded-xl bg-white/10 flex items-center justify-center">
            <i class="fas fa-shield-halved text-cyan-400 text-lg"></i>
          </div>
          <span class="text-xl font-bold tracking-tight text-white">ProxyPool</span>
        </div>
        <nav class="space-y-1">
          <a class="active flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition-all bg-white/10 text-white shadow-sm" href="/web">
            <i class="fas fa-globe w-5 text-center text-cyan-300"></i>可用代理
          </a>
          <a class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition-all text-slate-300 hover:bg-white/5 hover:text-white" href="/fetchers">
            <i class="fas fa-cloud-arrow-down w-5 text-center text-slate-400"></i>爬取器
          </a>
          <a class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium transition-all text-slate-300 hover:bg-white/5 hover:text-white" href="/logout">
            <i class="fas fa-right-from-bracket w-5 text-center text-slate-400"></i>退出登录
          </a>
        </nav>
      </div>
      <div class="mt-auto p-6 pt-2">
        <div class="glass-dark rounded-xl p-4 text-xs text-slate-400 leading-relaxed">
          <div class="flex items-center gap-2 mb-1.5">
            <i class="fas fa-circle-check text-emerald-400 text-[10px]"></i>
            <span class="font-medium text-slate-300">Worker 弱验证</span>
          </div>
          Worker + D1 版本仅提供弱验证，来源抓取成功且格式合法即标记为 validated。
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 lg:p-8 overflow-auto">
      <!-- Hero -->
      <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-6">
        <div>
          <h1 class="text-2xl lg:text-3xl font-bold tracking-tight text-slate-800">可用代理</h1>
          <p class="text-slate-500 text-sm mt-1">Worker + D1 版本仅提供弱验证，`validated` 代表来源抓取成功且格式合法。</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button class="btn-ghost inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 transition-all shadow-soft" id="refreshBtn">
            <i class="fas fa-rotate text-slate-400"></i>刷新
          </button>
          <button class="btn-ghost inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 transition-all shadow-soft" id="exportBtn">
            <i class="fas fa-download text-slate-400"></i>导出代理
          </button>
          <button class="btn-gradient-danger inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white transition-all shadow-soft" id="clearBtn">
            <i class="fas fa-trash-can"></i>清除代理
          </button>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
        <div class="card-glass rounded-2xl p-5 transition-all hover:shadow-soft-lg hover:-translate-y-0.5 shadow-soft">
          <div class="flex items-center gap-2 text-slate-400 text-xs font-medium uppercase tracking-wider mb-3">
            <i class="fas fa-layer-group text-xs"></i>全部代理
          </div>
          <div class="text-3xl font-bold text-slate-800" id="sum-proxies-cnt">0</div>
        </div>
        <div class="card-glass rounded-2xl p-5 transition-all hover:shadow-soft-lg hover:-translate-y-0.5 shadow-soft">
          <div class="flex items-center gap-2 text-emerald-500 text-xs font-medium uppercase tracking-wider mb-3">
            <i class="fas fa-circle-check text-xs"></i>当前可用
          </div>
          <div class="text-3xl font-bold text-emerald-600" id="validated-proxies-cnt">0</div>
        </div>
        <div class="card-glass rounded-2xl p-5 transition-all hover:shadow-soft-lg hover:-translate-y-0.5 shadow-soft">
          <div class="flex items-center gap-2 text-amber-500 text-xs font-medium uppercase tracking-wider mb-3">
            <i class="fas fa-clock text-xs"></i>等待验证
          </div>
          <div class="text-3xl font-bold text-amber-600" id="pending-proxies-cnt">0</div>
        </div>
        <div class="card-glass rounded-2xl p-5 transition-all hover:shadow-soft-lg hover:-translate-y-0.5 shadow-soft">
          <div class="flex items-center gap-2 text-violet-500 text-xs font-medium uppercase tracking-wider mb-3">
            <i class="fas fa-star text-xs"></i>高评分
          </div>
          <div class="text-3xl font-bold text-violet-600" id="high-score-cnt">0</div>
        </div>
        <div class="card-glass rounded-2xl p-5 transition-all hover:shadow-soft-lg hover:-translate-y-0.5 shadow-soft">
          <div class="flex items-center gap-2 text-sky-500 text-xs font-medium uppercase tracking-wider mb-3">
            <i class="fas fa-gauge-high text-xs"></i>平均延迟
          </div>
          <div class="text-3xl font-bold text-sky-600" id="avg-latency">0</div>
        </div>
      </div>

      <!-- Table Panel -->
      <div class="glass rounded-2xl shadow-soft-lg overflow-hidden">
        <div class="flex items-center justify-between gap-3 p-5 pb-3 border-b border-slate-100">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
              <i class="fas fa-table-list text-blue-500 text-sm"></i>
            </div>
            <div>
              <h2 class="text-sm font-semibold text-slate-700">代理明细</h2>
              <p class="text-xs text-slate-400">最近刷新：<span id="lastupdate" class="text-slate-500 font-medium">--</span></p>
            </div>
          </div>
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200/50">
            <i class="fas fa-triangle-exclamation text-[10px]"></i>弱验证模式
          </span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="border-b border-slate-100">
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">来源</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">类型</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">IP</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">端口</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">分数</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">验证模式</th>
                <th class="text-left px-5 py-3.5 text-[11px] font-semibold uppercase tracking-wider text-slate-400">最近发现</th>
              </tr>
            </thead>
            <tbody id="proxies-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Clear Dialog -->
  <dialog id="clearDialog" class="rounded-2xl shadow-soft-xl w-full max-w-sm p-0">
    <div class="p-6">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center">
          <i class="fas fa-trash-can text-red-500"></i>
        </div>
        <div>
          <h3 class="text-lg font-bold text-slate-800">清除代理</h3>
          <p class="text-sm text-slate-400">选择要清除的代理类型</p>
        </div>
      </div>
      <label class="block text-sm font-medium text-slate-600 mb-1.5">代理类型</label>
      <div class="relative">
        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
        <select id="clearProtocol" class="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 pr-10 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all">
          <option value="all">全部代理</option>
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
          <option value="socks4">SOCKS4</option>
          <option value="socks5">SOCKS5</option>
        </select>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <button class="btn-ghost px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 transition-all" id="clearCancelBtn">取消</button>
        <button class="btn-gradient-danger inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all" id="clearConfirmBtn">
          <i class="fas fa-trash-can"></i>确认清除
        </button>
      </div>
    </div>
  </dialog>

  <!-- Export Dialog -->
  <dialog id="exportDialog" class="rounded-2xl shadow-soft-xl w-full max-w-sm p-0">
    <div class="p-6">
      <div class="flex items-center gap-3 mb-5">
        <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center">
          <i class="fas fa-download text-blue-500"></i>
        </div>
        <div>
          <h3 class="text-lg font-bold text-slate-800">导出代理</h3>
          <p class="text-sm text-slate-400">选择导出范围和协议</p>
        </div>
      </div>
      <label class="block text-sm font-medium text-slate-600 mb-1.5">导出类型</label>
      <div class="relative mb-3">
        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
        <select id="exportType" class="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 pr-10 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all">
          <option value="validated">已验证代理</option>
          <option value="all">全部代理</option>
        </select>
      </div>
      <label class="block text-sm font-medium text-slate-600 mb-1.5">协议类型</label>
      <div class="relative">
        <i class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-xs"></i>
        <select id="exportProtocol" class="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 pr-10 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all">
          <option value="all">全部协议</option>
          <option value="http">HTTP</option>
          <option value="https">HTTPS</option>
          <option value="socks4">SOCKS4</option>
          <option value="socks5">SOCKS5</option>
        </select>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <button class="btn-ghost px-5 py-2.5 rounded-xl text-sm font-semibold text-slate-600 transition-all" id="exportCancelBtn">取消</button>
        <button class="btn-gradient-primary inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all" id="exportConfirmBtn">
          <i class="fas fa-download"></i>导出
        </button>
      </div>
    </div>
  </dialog>

  <!-- Notice Toast -->
  <div class="notice fixed right-5 bottom-5 glass-dark rounded-xl px-5 py-3 shadow-soft-xl opacity-0 translate-y-4 pointer-events-none flex items-center gap-2.5 text-sm text-white z-50" id="notice">
    <i class="fas fa-circle-check text-emerald-400"></i>
    <span id="notice-text"></span>
  </div>

  <script>
    const notice = document.getElementById('notice');
    const noticeText = document.getElementById('notice-text');
    const proxiesTbody = document.getElementById('proxies-tbody');

    function showNotice(message) {
      noticeText.textContent = message;
      notice.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
      notice.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        notice.classList.remove('opacity-100', 'translate-y-0');
        notice.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
      }, 2400);
    }

    function formatDate(value) {
      if (!value) return '';
      return new Date(value).toLocaleString('zh-CN', { hour12: false });
    }

    async function update() {
      const response = await fetch('/proxies_status');
      const data = await response.json();

      document.getElementById('sum-proxies-cnt').textContent = data.sum_proxies_cnt || 0;
      document.getElementById('validated-proxies-cnt').textContent = data.validated_proxies_cnt || 0;
      document.getElementById('pending-proxies-cnt').textContent = data.pending_proxies_cnt || 0;
      document.getElementById('high-score-cnt').textContent = data.high_score_cnt || 0;
      document.getElementById('avg-latency').textContent = data.avg_latency || 0;
      document.getElementById('lastupdate').textContent = new Date().toLocaleTimeString('zh-CN');

      const rows = (data.proxies || []).map((item) => `
        <tr class="border-b border-slate-50 tr-hover transition-all">
          <td class="px-5 py-3.5 text-sm text-slate-700">${item.source || item.fetcher_name || ''}</td>
          <td class="px-5 py-3.5"><span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600">${item.protocol}</span></td>
          <td class="px-5 py-3.5 text-sm font-mono text-slate-700">${item.ip}</td>
          <td class="px-5 py-3.5 text-sm font-mono text-slate-500">${item.port}</td>
          <td class="px-5 py-3.5">
            <span class="inline-flex items-center gap-1 text-sm font-semibold ${Number(item.score || 0) >= 8 ? 'text-emerald-600' : Number(item.score || 0) >= 5 ? 'text-amber-600' : 'text-slate-500'}">
              ${Number(item.score || 0).toFixed(2)}
            </span>
          </td>
          <td class="px-5 py-3.5"><span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-700">${item.validation_mode || 'source'}</span></td>
          <td class="px-5 py-3.5 text-sm text-slate-400">${formatDate(item.last_seen_at || item.to_validate_date)}</td>
        </tr>
      `).join('');
      proxiesTbody.innerHTML = rows || '<tr><td colspan="7" class="px-5 py-10 text-center text-slate-400"><i class="fas fa-inbox text-xl mb-2 block"></i>暂无数据</td></tr>';
    }

    async function clearProxies() {
      const protocol = document.getElementById('clearProtocol').value;
      const response = await fetch('/clear_proxies', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ protocol })
      });
      const data = await response.json();
      showNotice(`已清除 ${data.deleted_count || 0} 个代理`);
      document.getElementById('clearDialog').close();
      await update();
    }

    async function exportProxies() {
      const type = document.getElementById('exportType').value;
      const protocol = document.getElementById('exportProtocol').value;
      const response = await fetch('/export_proxies', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ type, protocol })
      });
      const body = await response.text();
      const blob = new Blob([body], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `proxies_${type}_${protocol}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      document.getElementById('exportDialog').close();
      showNotice('导出成功');
    }

    document.getElementById('refreshBtn').addEventListener('click', () => update().catch((error) => showNotice(error.message)));
    document.getElementById('clearBtn').addEventListener('click', () => document.getElementById('clearDialog').showModal());
    document.getElementById('exportBtn').addEventListener('click', () => document.getElementById('exportDialog').showModal());
    document.getElementById('clearCancelBtn').addEventListener('click', () => document.getElementById('clearDialog').close());
    document.getElementById('exportCancelBtn').addEventListener('click', () => document.getElementById('exportDialog').close());
    document.getElementById('clearConfirmBtn').addEventListener('click', () => clearProxies().catch((error) => showNotice(error.message)));
    document.getElementById('exportConfirmBtn').addEventListener('click', () => exportProxies().catch((error) => showNotice(error.message)));
    update().catch((error) => showNotice(error.message));
  </script>
</body>
</html>
